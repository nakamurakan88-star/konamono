<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗一覧 - お好み焼きDB</title>
  <link rel="icon" href="images/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <a href="index.html">
          <img src="images/icon.svg" alt="" class="logo-icon">
          お好み焼きDB
        </a>
      </div>
      <nav class="nav" id="nav">
        <a href="shops.html">店舗一覧</a>
        <a href="shop-request.html" id="nav-request" style="display:none;">店舗登録申請</a>
        <a href="profile.html" id="nav-profile" style="display:none;">マイページ</a>
        <a href="login.html" class="nav-register" id="nav-register">新規登録</a>
        <a href="login.html" class="nav-login" id="nav-auth">ログイン</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <h1 class="section-title">🔍 店舗検索</h1>

    <!-- 検索フォーム -->
    <div class="shops-search-box">
      <div class="shops-filter-row">
        <div class="shops-filter-item">
          <label class="shops-filter-label" for="filter-pref">都道府県</label>
          <select id="filter-pref" class="shops-filter-select" onchange="onPrefChange()">
            <option value="">全ての都道府県</option>
            <option value="北海道">北海道</option>
            <option value="青森県">青森県</option>
            <option value="岩手県">岩手県</option>
            <option value="宮城県">宮城県</option>
            <option value="秋田県">秋田県</option>
            <option value="山形県">山形県</option>
            <option value="福島県">福島県</option>
            <option value="茨城県">茨城県</option>
            <option value="栃木県">栃木県</option>
            <option value="群馬県">群馬県</option>
            <option value="埼玉県">埼玉県</option>
            <option value="千葉県">千葉県</option>
            <option value="東京都">東京都</option>
            <option value="神奈川県">神奈川県</option>
            <option value="新潟県">新潟県</option>
            <option value="富山県">富山県</option>
            <option value="石川県">石川県</option>
            <option value="福井県">福井県</option>
            <option value="山梨県">山梨県</option>
            <option value="長野県">長野県</option>
            <option value="岐阜県">岐阜県</option>
            <option value="静岡県">静岡県</option>
            <option value="愛知県">愛知県</option>
            <option value="三重県">三重県</option>
            <option value="滋賀県">滋賀県</option>
            <option value="京都府">京都府</option>
            <option value="大阪府">大阪府</option>
            <option value="兵庫県">兵庫県</option>
            <option value="奈良県">奈良県</option>
            <option value="和歌山県">和歌山県</option>
            <option value="鳥取県">鳥取県</option>
            <option value="島根県">島根県</option>
            <option value="岡山県">岡山県</option>
            <option value="広島県">広島県</option>
            <option value="山口県">山口県</option>
            <option value="徳島県">徳島県</option>
            <option value="香川県">香川県</option>
            <option value="愛媛県">愛媛県</option>
            <option value="高知県">高知県</option>
            <option value="福岡県">福岡県</option>
            <option value="佐賀県">佐賀県</option>
            <option value="長崎県">長崎県</option>
            <option value="熊本県">熊本県</option>
            <option value="大分県">大分県</option>
            <option value="宮崎県">宮崎県</option>
            <option value="鹿児島県">鹿児島県</option>
            <option value="沖縄県">沖縄県</option>
          </select>
        </div>
        <div class="shops-filter-item" id="city-filter-wrap">
          <label class="shops-filter-label" for="filter-city">市・区・町</label>
          <select id="filter-city" class="shops-filter-select" disabled>
            <option value="">都道府県を先に選択</option>
          </select>
        </div>
        <div class="shops-filter-item">
          <label class="shops-filter-label" for="filter-cooking">焼き方</label>
          <select id="filter-cooking" class="shops-filter-select">
            <option value="">すべて</option>
            <option value="店焼き">店焼き</option>
            <option value="自分焼き">自分焼き</option>
          </select>
        </div>
        <div class="shops-filter-item shops-filter-btn-wrap">
          <button class="btn btn-primary" onclick="applyFilter()">🔍 絞り込み</button>
          <button class="btn btn-secondary" onclick="resetFilter()">リセット</button>
        </div>
      </div>
    </div>

    <!-- 件数表示 + タブ切替 -->
    <div class="shops-result-header">
      <p id="result-count" class="shops-result-count"></p>
      <div class="shops-view-tabs">
        <button id="tab-list" class="shops-tab shops-tab-active" onclick="switchView('list')">📋 リスト</button>
        <button id="tab-map"  class="shops-tab" onclick="switchView('map')">🗺️ 地図</button>
      </div>
    </div>

    <!-- リスト表示 -->
    <div id="view-list">
      <div class="shop-grid" id="shops-grid">
        <div class="loading">読み込み中</div>
      </div>
    </div>

    <!-- 地図表示 -->
    <div id="view-map" style="display:none;">
      <div id="shops-map" class="shops-map-area"></div>
      <p id="map-no-location" class="map-no-location" style="display:none;">
        ※ 位置情報（緯度・経度）がない店舗は地図に表示されません。
      </p>
    </div>

  </main>

  <footer class="footer">
    <p>&copy; 2026 お好み焼きDB. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shops.js"></script>
</body>
</html>
