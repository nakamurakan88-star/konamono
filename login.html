<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - お好み焼きDB</title>
  <link rel="icon" href="images/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <a href="index.html">
          <img src="images/icon.svg" alt="" class="logo-icon">
          お好み焼きDB
        </a>
      </div>
      <nav class="nav">
        <a href="shops.html">店舗一覧</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="auth-container">
      <h2>
        <img src="images/icon.svg" alt="" style="width:32px;height:32px;vertical-align:middle;margin-right:8px;">
        お好み焼きDB
      </h2>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">ログイン</div>
        <div class="auth-tab" onclick="switchTab('register')">新規登録</div>
      </div>

      <div id="auth-message" class="auth-message"></div>

      <div id="login-form">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="login-email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="パスワード">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">ログイン</button>
      </div>

      <div id="register-form" style="display:none;">
        <div class="form-group">
          <label>ユーザー名</label>
          <input type="text" id="register-username" placeholder="お好み焼き太郎">
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="register-email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="register-password" placeholder="パスワード">
        </div>
        <button class="btn btn-primary" style="width:100%;" id="register-btn" onclick="doRegister()">アカウント作成</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 お好み焼きDB. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
